<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>두피 AI 진단</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ec;
    --white: #ffffff;
    --dark: #1a1a1a;
    --mid: #555;
    --accent: #2d6a4f;
    --accent2: #52b788;
    --light-green: #d8f3dc;
    --border: #e0dbd2;
    --warn: #e07a5f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
  }
  header {
    background: var(--accent);
    color: white;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    letter-spacing: 0.5px;
  }
  header .sub {
    font-size: 0.72rem;
    opacity: 0.75;
    margin-top: 1px;
    font-weight: 300;
  }
  header .badge {
    margin-left: auto;
    background: var(--accent2);
    font-size: 0.65rem;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  main { max-width: 540px; margin: 0 auto; padding: 28px 20px 60px; }
  .card {
    background: var(--white);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .section-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .upload-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: #fafaf8;
  }
  .upload-area:hover, .upload-area.drag-over {
    border-color: var(--accent2);
    background: var(--light-green);
  }
  .upload-area input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 2.4rem; margin-bottom: 8px; }
  .upload-area p { font-size: 0.85rem; color: var(--mid); line-height: 1.6; }
  .upload-area strong { color: var(--accent); }
  #preview-wrap { display: none; margin-top: 16px; text-align: center; }
  #preview-img {
    max-width: 100%;
    max-height: 260px;
    border-radius: 10px;
    border: 1px solid var(--border);
    object-fit: cover;
  }
  .change-btn {
    display: inline-block;
    margin-top: 8px;
    font-size: 0.75rem;
    color: var(--mid);
    cursor: pointer;
    text-decoration: underline;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 0.72rem; color: var(--mid); font-weight: 500; }
  .form-group input, .form-group select {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 0.85rem;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--dark);
    background: #fafaf8;
    outline: none;
    transition: border 0.2s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent2); }
  .analyze-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.5px;
  }
  .analyze-btn:hover { background: #1e4d38; }
  .analyze-btn:active { transform: scale(0.99); }
  .analyze-btn:disabled { background: #b0b0b0; cursor: not-allowed; transform: none; }
  #loading { display: none; text-align: center; padding: 32px; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--light-green);
    border-top: 3px solid var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 0.85rem; color: var(--mid); }
  #result { display: none; }
  .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .result-header h2 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--accent); }
  .result-date { font-size: 0.72rem; color: var(--mid); }
  .score-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .score-box { background: var(--light-green); border-radius: 12px; padding: 14px 10px; text-align: center; }
  .score-box .score-label { font-size: 0.68rem; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
  .score-box .score-val { font-size: 1.5rem; font-weight: 700; color: var(--accent); font-family: 'DM Serif Display', serif; }
  .score-box .score-grade { font-size: 0.7rem; color: var(--mid); }
  .diagnosis-section { margin-bottom: 18px; }
  .diagnosis-section h3 {
    font-size: 0.75rem; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .diagnosis-section p { font-size: 0.88rem; line-height: 1.8; color: #333; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .tag { background: var(--light-green); color: var(--accent); font-size: 0.72rem; padding: 4px 10px; border-radius: 20px; font-weight: 500; }
  .tag.warn { background: #fde8e3; color: var(--warn); }
  .recommend-list { list-style: none; }
  .recommend-list li {
    font-size: 0.85rem; line-height: 1.7; padding: 6px 0;
    border-bottom: 1px solid var(--border); color: #333;
    display: flex; gap: 8px;
  }
  .recommend-list li:last-child { border-bottom: none; }
  .recommend-list li::before { content: "→"; color: var(--accent2); font-weight: 700; flex-shrink: 0; }
  .print-btn {
    width: 100%; background: white; color: var(--accent);
    border: 2px solid var(--accent); border-radius: 12px; padding: 13px;
    font-size: 0.9rem; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; margin-top: 8px; transition: all 0.2s;
  }
  .print-btn:hover { background: var(--light-green); }
  .error-box {
    background: #fde8e3; border: 1px solid #f4a896; border-radius: 10px;
    padding: 14px; font-size: 0.85rem; color: #c0392b;
    display: none; margin-top: 12px;
  }
  @media print {
    header, .card:not(#result-card), .print-btn { display: none !important; }
    #result-card { box-shadow: none; border: none; }
    body { background: white; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-text">ScalpAI</div>
    <div class="sub">두피 AI 진단 시스템</div>
  </div>
  <div class="badge">SALON PRO</div>
</header>

<main>

  <div class="card" id="upload-card">
    <div class="section-title">📸 두피 이미지 업로드</div>
    <div class="upload-area" id="upload-area">
      <input type="file" id="file-input" accept="image/*" capture="environment">
      <div class="upload-icon">🔬</div>
      <p><strong>사진을 선택하거나 드래그하세요</strong><br>두피 카메라 또는 스마트폰 접사 촬영</p>
    </div>
    <div id="preview-wrap">
      <img id="preview-img" src="" alt="두피 이미지">
      <div class="change-btn" onclick="resetImage()">이미지 다시 선택</div>
    </div>
  </div>

  <div class="card" id="info-card">
    <div class="section-title">👤 고객 정보 (선택)</div>
    <div class="form-row">
      <div class="form-group">
        <label>고객명</label>
        <input type="text" id="customer-name" placeholder="홍길동">
      </div>
      <div class="form-group">
        <label>연령대</label>
        <select id="customer-age">
          <option value="">선택</option>
          <option>10대</option><option>20대</option><option>30대</option>
          <option>40대</option><option>50대</option><option>60대 이상</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>성별</label>
        <select id="customer-gender">
          <option value="">선택</option>
          <option>여성</option><option>남성</option>
        </select>
      </div>
      <div class="form-group">
        <label>주요 고민</label>
        <select id="customer-concern">
          <option value="">선택</option>
          <option>탈모</option><option>가려움</option><option>비듬</option>
          <option>지성</option><option>건성</option><option>민감성</option>
        </select>
      </div>
    </div>
  </div>

  <button class="analyze-btn" id="analyze-btn" onclick="analyze()" disabled>
    이미지를 먼저 업로드하세요
  </button>
  <div class="error-box" id="error-box"></div>

  <div id="loading" class="card">
    <div class="spinner"></div>
    <p>AI가 두피 상태를 분석 중입니다...<br>잠시만 기다려주세요</p>
  </div>

  <div id="result">
    <div class="card" id="result-card">
      <div class="result-header">
        <h2>두피 진단 리포트</h2>
        <div class="result-date" id="result-date"></div>
      </div>
      <div class="score-row" id="score-row"></div>
      <div class="diagnosis-section">
        <h3>🔍 두피 상태 분석</h3>
        <p id="diagnosis-text"></p>
      </div>
      <div class="diagnosis-section">
        <h3>⚠️ 주요 관찰 사항</h3>
        <div class="tag-list" id="issues-tags"></div>
      </div>
      <div class="diagnosis-section">
        <h3>💡 관리 추천</h3>
        <ul class="recommend-list" id="recommend-list"></ul>
      </div>
      <div class="diagnosis-section">
        <h3>🧴 제품 추천 유형</h3>
        <p id="product-text"></p>
      </div>
    </div>
    <button class="print-btn" onclick="window.print()">🖨️ 리포트 인쇄 / PDF 저장</button>
    <button class="print-btn" style="margin-top:8px" onclick="resetAll()">🔄 새로운 진단 시작</button>
  </div>

</main>

<script>
  // ★ Cloudflare Worker URL로 변경하세요
  const WORKER_URL = 'https://stone7004.app.n8n.cloud/webhook/eb35de6f-463c-469b-b6b4-8876cb6f9568';

  let imageBase64 = null;
  let imageType = null;

  const fileInput = document.getElementById('file-input');
  const uploadArea = document.getElementById('upload-area');
  const previewWrap = document.getElementById('preview-wrap');
  const previewImg = document.getElementById('preview-img');
  const analyzeBtn = document.getElementById('analyze-btn');

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) readImage(file);
  });

  uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) readImage(file);
  });

  function readImage(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const result = e.target.result;
      imageType = file.type || 'image/jpeg';
      imageBase64 = result.split(',')[1];
      previewImg.src = result;
      previewWrap.style.display = 'block';
      uploadArea.style.display = 'none';
      analyzeBtn.disabled = false;
      analyzeBtn.textContent = '🔬 AI 두피 분석 시작';
    };
    reader.readAsDataURL(file);
  }

  function resetImage() {
    imageBase64 = null; imageType = null;
    fileInput.value = '';
    previewWrap.style.display = 'none';
    uploadArea.style.display = 'block';
    analyzeBtn.disabled = true;
    analyzeBtn.textContent = '이미지를 먼저 업로드하세요';
  }

  function resetAll() {
    resetImage();
    document.getElementById('result').style.display = 'none';
    document.getElementById('error-box').style.display = 'none';
    document.getElementById('upload-card').style.display = 'block';
    document.getElementById('info-card').style.display = 'block';
    analyzeBtn.style.display = 'block';
  }

  async function analyze() {
    if (!imageBase64) return;

    const name = document.getElementById('customer-name').value || '고객';
    const age = document.getElementById('customer-age').value;
    const gender = document.getElementById('customer-gender').value;
    const concern = document.getElementById('customer-concern').value;
    const customerInfo = [age, gender, concern].filter(Boolean).join(', ');

    const prompt = `당신은 두피 전문가입니다. 업로드된 두피 이미지를 분석하여 아래 JSON 형식으로만 응답하세요. 다른 텍스트는 절대 포함하지 마세요.

고객 정보: ${customerInfo || '미입력'}

{
  "scores": [
    {"label": "두피 청결도", "value": 0-100 숫자, "grade": "A/B/C/D 중 하나"},
    {"label": "모공 상태", "value": 0-100 숫자, "grade": "A/B/C/D 중 하나"},
    {"label": "전반적 건강", "value": 0-100 숫자, "grade": "A/B/C/D 중 하나"}
  ],
  "diagnosis": "두피 상태에 대한 전문적 분석 2-3문장",
  "issues": ["관찰된 문제점 1", "관찰된 문제점 2"],
  "recommendations": ["관리 방법 1", "관리 방법 2", "관리 방법 3"],
  "productType": "추천 제품 유형 설명 1-2문장"
}`;

    document.getElementById('upload-card').style.display = 'none';
    document.getElementById('info-card').style.display = 'none';
    analyzeBtn.style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('error-box').style.display = 'none';

    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: imageType, data: imageBase64 } },
              { type: 'text', text: prompt }
            ]
          }]
        })
      });

      const data = await response.json();
      const text = data.content?.map(i => i.text || '').join('');
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      renderResult(parsed, name);

    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('upload-card').style.display = 'block';
      document.getElementById('info-card').style.display = 'block';
      analyzeBtn.style.display = 'block';
      const errorBox = document.getElementById('error-box');
      errorBox.style.display = 'block';
      errorBox.textContent = '분석 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
    }
  }

  function renderResult(data, name) {
    document.getElementById('loading').style.display = 'none';
    const now = new Date();
    document.getElementById('result-date').textContent =
      `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} · ${name}`;

    document.getElementById('score-row').innerHTML = data.scores.map(s => `
      <div class="score-box">
        <div class="score-label">${s.label}</div>
        <div class="score-val">${s.value}</div>
        <div class="score-grade">등급 ${s.grade}</div>
      </div>`).join('');

    document.getElementById('diagnosis-text').textContent = data.diagnosis;
    document.getElementById('issues-tags').innerHTML = data.issues.map(i => `<span class="tag warn">${i}</span>`).join('');
    document.getElementById('recommend-list').innerHTML = data.recommendations.map(r => `<li>${r}</li>`).join('');
    document.getElementById('product-text').textContent = data.productType;

    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
  }
</script>
</body>
</html>
